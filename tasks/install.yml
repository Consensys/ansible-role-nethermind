---
- name: Install dependencies for Nethermind
  ansible.builtin.package:
    name:
      - libsnappy-dev
      - libc6-dev
      - libc6
      - unzip
    state: latest
  become: true
  when: ansible_os_family != "Darwin"

- name: Include version setter task
  ansible.builtin.include_tasks: version.yml

- name: install | Lookup nethermind user
  ansible.builtin.getent:
    database: passwd
    key: "{{ nethermind_user }}"
  register: nethermind_user_entry
  failed_when: false

- name: install | Determine if nethermind user exists
  ansible.builtin.set_fact:
    nethermind_user_exists: "{{ nethermind_user in (nethermind_user_entry.ansible_facts.getent_passwd | default({})) }}"

- name: install | Update UID if needed
  block:
    - name: install | Extract current UID (only if user exists)
      ansible.builtin.set_fact:
        nethermind_current_uid: "{{ nethermind_user_entry.ansible_facts.getent_passwd[nethermind_user][1] | int }}"

    - name: install | Determine if UID update is needed
      ansible.builtin.set_fact:
        nethermind_uid_needs_update: "{{ nethermind_current_uid != nethermind_uid }}"

    - name: install | Stop enabled nethermind services if UID needs update
      ansible.builtin.service:
        name: nethermind
        state: stopped
      when: nethermind_uid_needs_update
      become: true

    - name: install | Set updated optionally to trigger a systemd restart at the end
      ansible.builtin.set_fact:
        nethermind_state_updates: "{{ nethermind_state_updates + ['nethermind.uid'] }}"
      when: nethermind_uid_needs_update

  when: nethermind_user_exists

- name: Ensure nethermind group exists
  ansible.builtin.group:
    name: "{{ nethermind_group }}"
    gid: "{{ nethermind_gid }}"
    state: present
  become: true

- name: Create nethermind user
  ansible.builtin.user:
    comment: nethermind client user
    name: "{{ nethermind_user }}"
    uid: "{{ nethermind_uid }}"
    group: "{{ nethermind_group }}"
  become: true

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nethermind_user }}"
    group: "{{ nethermind_group }}"
    mode: '0755'
    recurse: true
  loop:
    - "{{ nethermind_base_dir }}"
    - "{{ nethermind_install_dir }}"
    - "{{ nethermind_log_dir }}"
    - "{{ nethermind_config_dir }}"
    - "{{ nethermind_data_dir }}"
  become: true

- name: Ownership init marker
  ansible.builtin.stat:
    path: "{{ nethermind_data_dir }}/.ownership_initialized"
  register: ownership_marker

- name: Setup logrotate
  ansible.builtin.template:
    src: logrotate/nethermind
    dest: /etc/logrotate.d/nethermind
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Halt the service if its running while we update
  ansible.builtin.systemd_service:
    name: nethermind
    state: stopped
  become: true
  register: nethermind_systemd_stopped
  when:
    - ansible_facts.services['nethermind.service'] is defined
    - ansible_facts.services['nethermind.service'].status == "enabled"

- name: Set updated optionally to trigger a systemd restart at the end
  ansible.builtin.set_fact:
    nethermind_state_updates: "{{ nethermind_state_updates + ['nethermind.running_service'] }}"
  when:
    - nethermind_systemd_stopped is defined
    - nethermind_systemd_stopped.state | default('') == "stopped"

- name: install | Initialize data directory ownership
  block:
    - name: One-time recursive ownership of data dir
      ansible.builtin.file:
        path: "{{ nethermind_data_dir }}"
        state: directory
        owner: "{{ nethermind_user }}"
        group: "{{ nethermind_group }}"
        mode: '0755'
        recurse: true
      become: true

    - name: Record that ownership was initialized
      ansible.builtin.copy:
        dest: "{{ nethermind_data_dir }}/.ownership_initialized"
        content: "initialized: {{ ansible_date_time.iso8601 }}"
        owner: "{{ nethermind_user }}"
        group: "{{ nethermind_group }}"
        mode: '0644'
      become: true
  when: not ownership_marker.stat.exists

- name: Extract nethermind binary to install directory
  ansible.builtin.unarchive:
    src: "{{ nethermind_download_url }}"
    remote_src: true
    dest: "{{ nethermind_install_dir }}"
    owner: "{{ nethermind_user }}"
    group: "{{ nethermind_group }}"
    mode: '0775'
  become: true
  register: extract_src

- name: Stop nethermind systemd service if running
  ansible.builtin.service:
    name: nethermind
    state: stopped
  when:
    - extract_src is changed
    - nethermind_managed_service
    - ansible_os_family != "Darwin"
  become: true
  ignore_errors: true

- name: Create a symlink to current
  ansible.builtin.file:
    src: "{{ nethermind_install_dir }}/"
    dest: "{{ nethermind_current_dir }}"
    state: link
  become: true

- name: Set updated optionally to trigger a systemd restart at the end
  ansible.builtin.set_fact:
    nethermind_state_updates: "{{ nethermind_state_updates + ['nethermind.install_dir'] }}"
  when: extract_src is changed
